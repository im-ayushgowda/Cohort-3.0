<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Basics — Complete Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e28;
    --bg4: #222634;
    --border: #2a2f40;
    --border2: #363c52;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #555a72;
    --accent: #5b8af0;
    --accent-dim: #1e2d52;
    --green: #4eca8b;
    --green-dim: #162a22;
    --amber: #f0b45b;
    --amber-dim: #2a2010;
    --pink: #e06b8b;
    --pink-dim: #2a1520;
    --teal: #4eccc8;
    --teal-dim: #0f2a2a;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 900px; margin: 0 auto; }
  .logo {
    font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
    color: var(--text); margin-bottom: 1rem;
  }
  .logo span { color: var(--accent); }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap {
    position: relative; flex: 1; min-width: 200px;
  }
  .search-wrap input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 8px 12px 8px 36px;
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 15px; pointer-events: none;
  }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; padding: 4px 12px;
    border-radius: 999px; border: 1px solid var(--border2);
    background: var(--bg3); color: var(--text2); cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .tag:hover { border-color: var(--border2); background: var(--bg4); color: var(--text); }
  .tag.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* ── Main ── */
  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .section { margin-bottom: 2.5rem; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text3);
    padding: 3px 10px; border: 1px solid var(--border);
    border-radius: 999px;
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* ── Question blocks ── */
  .q-block {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg2);
    margin-bottom: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .q-block:hover { border-color: var(--border2); }
  .q-block.open { border-color: var(--border2); }

  .q-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; cursor: pointer; user-select: none;
  }
  .q-num {
    min-width: 24px; height: 24px; border-radius: 6px;
    background: var(--bg4); border: 1px solid var(--border2);
    font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
    color: var(--text3); display: flex; align-items: center; justify-content: center;
    margin-top: 1px; flex-shrink: 0;
  }
  .q-text { flex: 1; font-size: 14px; color: var(--text2); font-weight: 400; line-height: 1.5; }
  .q-block.open .q-text { color: var(--text); }
  .q-chevron { color: var(--text3); font-size: 13px; transition: transform 0.2s; margin-top: 3px; flex-shrink: 0; }
  .q-block.open .q-chevron { transform: rotate(90deg); color: var(--accent); }

  .q-body { display: none; border-top: 1px solid var(--border); }
  .q-block.open .q-body { display: block; }

  pre {
    padding: 16px 20px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.75; overflow-x: auto;
    background: var(--bg3); color: #c9d1e8; tab-size: 2;
    white-space: pre;
  }

  /* ── Syntax colors ── */
  .kw  { color: #7eb8f7; }
  .str { color: #88d498; }
  .num { color: #f0c070; }
  .cmt { color: #4a5170; font-style: italic; }
  .fn  { color: #d4a0d0; }
  .op  { color: #e08060; }

  /* ── Stats bar ── */
  .stats {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 1rem 0 1.5rem;
    font-size: 12px; color: var(--text3);
    border-bottom: 1px solid var(--border); margin-bottom: 2rem;
  }
  .stat strong { color: var(--accent); font-weight: 600; }

  /* ── No results ── */
  .no-results {
    text-align: center; padding: 4rem 0;
    color: var(--text3); font-size: 14px;
  }

  /* ── Footer ── */
  footer {
    text-align: center; padding: 2rem;
    border-top: 1px solid var(--border);
    color: var(--text3); font-size: 12px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">JS<span>.</span>Basics — Complete Reference</div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search questions..." oninput="filterAll()">
      </div>
      <div class="tags" id="tagBar">
        <span class="tag active" onclick="setTag('all',this)">All</span>
        <span class="tag" onclick="setTag('console',this)">Console</span>
        <span class="tag" onclick="setTag('variables',this)">Variables</span>
        <span class="tag" onclick="setTag('datatypes',this)">Data Types</span>
        <span class="tag" onclick="setTag('conversion',this)">Conversion</span>
        <span class="tag" onclick="setTag('operators',this)">Operators</span>
        <span class="tag" onclick="setTag('strings',this)">Strings</span>
        <span class="tag" onclick="setTag('math',this)">Math</span>
        <span class="tag" onclick="setTag('conditionals',this)">Conditionals</span>
        <span class="tag" onclick="setTag('truthy',this)">Truthy/Falsy</span>
        <span class="tag" onclick="setTag('ternary',this)">Ternary</span>
        <span class="tag" onclick="setTag('mixed',this)">Mixed</span>
        <span class="tag" onclick="setTag('logical',this)">Logical</span>
        <span class="tag" onclick="setTag('challenge',this)">Challenges</span>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="stats" id="statsBar"></div>
  <div id="allSections"></div>
  <div class="no-results" id="noResults" style="display:none">No matching questions found.</div>
</main>

<footer>JavaScript Basics Reference &mdash; All topics in one file</footer>

<script>

  { section: "Console & Basics", tag: "console", items: [

  { section: "Data Types", tag: "datatypes", items: [
    { q: 'Create variables of type string, number, boolean, null, and undefined', code:
`<span class="kw">let</span> str  = <span class="str">"Hello"</span>;      <span class="cmt">// string</span>
<span class="kw">let</span> num  = <span class="num">42</span>;          <span class="cmt">// number</span>

<span class="kw">let</span> u;                   <span class="cmt">// undefined</span>` },
    { q: 'Check the type of different variables using typeof', code:

console.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="num">42</span>);        <span class="cmt">// "number"</span>

console.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="kw">undefined</span>); <span class="cmt">// "undefined"</span>
console.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="kw">null</span>);      <span class="cmt">// "object" ← JS quirk!</span>` },
    { q: 'Store your mobile number in a variable and check its type', code:
`<span class="kw">let</span> mobile = <span class="num">9876543210</span>;
console.<span class="fn">log</span>(<span class="kw">typeof</span> mobile); <span class="cmt">// "number"</span>` },
    { q: 'Create a variable with value null and check its type', code:
`<span class="kw">let</span> val = <span class="kw">null</span>;

    { q: 'Create a bigint number and print it', code:
`<span class="kw">const</span> big = <span class="num">9007199254740991</span>n;
console.<span class="fn">log</span>(big);         <span class="cmt">// 9007199254740991n</span>
console.<span class="fn">log</span>(<span class="kw">typeof</span> big);  <span class="cmt">// "bigint"</span>` },

console.<span class="fn">log</span>(<span class="kw">true</span> + <span class="num">1</span>);  <span class="cmt">// 2    — true coerces to 1</span>` },
    { q: 'Convert "123abc" into a number', code:

    { q: 'Use parseInt() on "500px"', code:
`console.<span class="fn">log</span>(<span class="fn">parseInt</span>(<span class="str">"500px"</span>)); <span class="cmt">// 500</span>` },
  ]},

  { section: "Operators", tag: "operators", items: [
    { q: 'Add two numbers and print the result', code:
`<span class="kw">let</span> sum = <span class="num">15</span> + <span class="num">25</span>;
console.<span class="fn">log</span>(sum); <span class="cmt">// 40</span>` },
    { q: 'Find the remainder when 25 is divided by 4', code:
`console.<span class="fn">log</span>(<span class="num">25</span> % <span class="num">4</span>); <span class="cmt">// 1</span>` },
    { q: 'Find the square of a number using exponent operator', code:
`console.<span class="fn">log</span>(<span class="num">5</span> ** <span class="num">2</span>); <span class="cmt">// 25</span>` },
    { q: 'Increment a variable using ++', code:
`<span class="kw">let</span> x = <span class="num">5</span>;
x++;
console.<span class="fn">log</span>(x); <span class="cmt">// 6</span>` },
    { q: 'Decrement a variable using --', code:
`<span class="kw">let</span> x = <span class="num">5</span>;
x--;
console.<span class="fn">log</span>(x); <span class="cmt">// 4</span>` },
    { q: 'Use += operator to increase a variable by 20', code:
`<span class="kw">let</span> score = <span class="num">80</span>;
score += <span class="num">20</span>;
console.<span class="fn">log</span>(score); <span class="cmt">// 100</span>` },
    { q: 'Compare two numbers using >, <, >=, <=', code:
`console.<span class="fn">log</span>(<span class="num">10</span> > <span class="num">5</span>);    <span class="cmt">// true</span>
console.<span class="fn">log</span>(<span class="num">10</span> < <span class="num">5</span>);    <span class="cmt">// false</span>
console.<span class="fn">log</span>(<span class="num">10</span> >= <span class="num">10</span>);  <span class="cmt">// true</span>
console.<span class="fn">log</span>(<span class="num">10</span> <= <span class="num">9</span>);   <span class="cmt">// false</span>` },
    { q: 'Check if two values are strictly equal using ===', code:
`console.<span class="fn">log</span>(<span class="num">5</span> === <span class="num">5</span>);     <span class="cmt">// true</span>
console.<span class="fn">log</span>(<span class="num">5</span> === <span class="str">"5"</span>);  <span class="cmt">// false — different types</span>` },
    { q: 'Compare "10" and 10 using == and ===', code:

let activeTag = 'all';

function renderAll(filter = '') {
  const container = document.getElementById('allSections');
  const noResults = document.getElementById('noResults');
  const statsBar  = document.getElementById('statsBar');
  container.innerHTML = '';
  const q = filter.toLowerCase().trim();
  let totalQ = 0, totalSec = 0;

  DATA.forEach(section => {
    if (activeTag !== 'all' && section.tag !== activeTag) return;
    const filtered = section.items.filter(item =>
      !q || item.q.toLowerCase().includes(q)
    );
    if (!filtered.length) return;
    totalQ += filtered.length;
    totalSec++;

    const sec = document.createElement('div');
    sec.className = 'section';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<span class="section-label">${section.section}</span><div class="section-line"></div>`;
    sec.appendChild(header);

    filtered.forEach((item, i) => {
      const block = document.createElement('div');
      block.className = 'q-block';
      block.innerHTML = `
        <div class="q-header" onclick="toggle(this.parentElement)">
          <span class="q-num">${i + 1}</span>
          <span class="q-text">${item.q}</span>
          <span class="q-chevron">▶</span>
        </div>
        <div class="q-body"><pre>${item.code}</pre></div>`;
      sec.appendChild(block);
    });
    container.appendChild(sec);
  });

  statsBar.innerHTML = `<span><strong>${totalQ}</strong> questions</span><span><strong>${totalSec}</strong> sections</span>`;
  noResults.style.display = totalQ === 0 ? 'block' : 'none';
}

function toggle(block) {
  block.classList.toggle('open');
}

function filterAll() {
  renderAll(document.getElementById('searchInput').value);
}

function setTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll(document.getElementById('searchInput').value);
}

renderAll();
</script>
