<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu - Pokemon Gen 1</title>
    <link rel="stylesheet" href="style.css">
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Background Panels using Absolute Positioning -->
        <div class="panel-left"></div>
        <div class="panel-right"></div>

        <!-- Pokeball Watermark using purely CSS and Absolute Positioning -->
        <div class="pokeball-watermark">
            <div class="inner-circle"></div>
            <div class="center-line"></div>
        </div>

        <!-- Logo (Absolute) -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo" class="logo">

        <!-- Hamburger Menu (Absolute) -->
        <i class="ri-menu-line menu-icon"></i>

        <!-- Content Area (Absolute) -->
        <div class="content">
            <h3 class="subtitle">P o k e m o n &nbsp;&nbsp; G e n &nbsp;&nbsp; 1</h3>
            <h1 class="title">Pikachu</h1>
            <p class="description">
                Pikachu is an Electric-type Pokémon introduced<br>
                in Generation I. Pikachu are small, chubby,<br>
                and incredibly cute mouse-like Pokémon.<br>
                They are almost completely covered by<br>
                yellow fur.
            </p>
            
            <div class="pagination">
                <span class="line"></span>
                <span class="page-number">01 / 08</span>
            </div>
        </div>

        <!-- Pikachu Image (Absolute) -->
        <img src="pikachu.png" alt="Pikachu" class="pikachu-img">

        <!-- Right Side Pagination Dots (Absolute) -->
        <div class="dots-container">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
