<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insect Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./insect.css" />
  </head>
  <body>
    <main class="layout">
      <section class="left-panel">
        <header class="left-top">
          <h1>INSECT</h1>
          <div class="search-box">
            <span class="icon">⌕</span>
            <input type="text" placeholder="Search..." />
          </div>
        </header>

        <div class="classification-wrap">
          <p class="vertical-title">Classification</p>

          <ul class="class-list">
            <li><span>Class:</span> Insecta</li>
            <li><span>Order:</span> Coleoptera</li>
            <li><span>Family:</span> Cerambycidae</li>
            <li><span>Sub-Family:</span> Cerambycinae</li>
            <li><span>Tribe:</span> Callicromatini</li>
            <li><span>Genus:</span> Pachyteria</li>
          </ul>
        </div>
      </section>

      <section class="right-panel">
        <header class="right-top">
          <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
          </nav>
        </header>

        <div class="details">
          <h2>Pachyteria<br />equestris</h2>

          <div class="meta-grid">
            <div class="insect-icon">
              <img
                src="https://placehold.co/64x120/ca3a34/f6d9cc?text=ICON"
                alt="Insect icon placeholder"
              />
              <p>32 mm</p>
            </div>
            <ul>
              <li><span>Locality:</span> Malaysia</li>
              <li><span>Sex:</span> Male</li>
              <li><span>Size:</span> 32 mm / 12 mm</li>
            </ul>
          </div>

          <p class="price">$5.99</p>

          <div class="switches">
            <label><input type="checkbox" /> View detailed antennae</label>
            <label><input type="checkbox" /> View underside</label>
          </div>

          <button type="button">Add to collection</button>
        </div>
      </section>

      <section class="center-showcase" aria-label="Insect display placeholder">
        <div class="dome">
          <!-- <img
            class="dome-img"
            src=""
            alt="Glass dome placeholder"
          /> -->
          <img
            class="insect-img"
            src="./ChatGPT Image May 11, 2026, 06_06_24 PM.png"
            alt="Insect placeholder"
          />
          <img
            class="base-img"
            src="https://placehold.co/420x140/c0935a/5f3a1a?text=BASE"
            alt="Display base placeholder"
          />
        </div>
      </section>
    </main>
  </body>
</html>
