<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore Art Work</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./artwork.css" />
  </head>
  <body>
    <main class="art-page">
      <span class="dot dot-1"></span>
      <span class="dot dot-2"></span>
      <span class="dot dot-3"></span>
      <span class="dot dot-4"></span>
      <span class="dot dot-5"></span>
      <span class="dot dot-6"></span>

      <header class="topbar">
        <h1>Explore Art Work</h1>
        <a href="#">See All</a>
      </header>

      <section class="card-grid">
        <article class="art-card">
          <img src="https://i.pinimg.com/736x/bd/0a/92/bd0a922b14b9cce1da868e29a45f8e62.jpg" alt="Monocular placeholder" />
          <div class="meta"><h2>Monocular</h2><p>54.8k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>

        <article class="art-card">
          <img src="https://i.ytimg.com/vi/dWOvDpSrlwk/hqdefault.jpg?sqp=-oaymwEmCOADEOgC8quKqQMa8AEB-AHaBYAC0AWKAgwIABABGF4gXiheMA8=&rs=AOn4CLDsd0mc5HppyelMwsmXh1thLZfUfg" alt="Horns Mask placeholder" />
          <div class="meta"><h2>Horns Mask</h2><p>32.4k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>

        <article class="art-card">
          <img src="https://cdnb.artstation.com/p/assets/images/images/037/372/609/smaller_square/san-limo-poster-141.jpg?1620212066" alt="Light Moon placeholder" />
          <div class="meta"><h2>Light Moon</h2><p>86.8k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>

        <article class="art-card">
          <img src="https://c.saavncdn.com/artists/Sickick_500x500.jpg" alt="Skull Wire placeholder" />
          <div class="meta"><h2>Skull Wire</h2><p>78.9k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>

        <article class="art-card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTZUe-VIGUgRQLFMlg-nJLfw6qb9pBPSblq_mmgK5S5l8bVaSKe" alt="Spiderman placeholder" />
          <div class="meta"><h2>Spiderman</h2><p>24.8k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>

        <article class="art-card">
          <img src="https://encrypted-tbn2.gstatic.com/images?q=tbn:ANd9GcQWfodV2ZQaHaRVwj0wE-eyAQ90Z9mJzRtuTEVn9tx8KEatBM8_" alt="DeadPool placeholder" />
          <div class="meta"><h2>DeadPool</h2><p>59.7k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>

        <article class="art-card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSpklYdEgBauhYZWPPwwAMygrjtbykzIzJsm19cAIs6GV-JlSsA" alt="White Eye placeholder" />
          <div class="meta"><h2>White Eye</h2><p>45.7k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>

        <article class="art-card">
          <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcTv61Sp1uIZxBu0Y_OPC4zrMTiZpQCbIUgHPefB3KuD1r5q0T_6" alt="Plastic Spinal placeholder" />
          <div class="meta"><h2>Plastic Spinal</h2><p>98.6k ♡</p></div>
          <button type="button">Place Bid</button>
        </article>
      </section>
    </main>
  </body>
</html>
